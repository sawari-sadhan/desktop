name: Deploy Desktop Terminal

on:
  push:
    tags:
      - 'v*'

env:
  PROJECT_PATH: projects/sawarisadhan/desktop
  USER: ${{ secrets.USER }}
  HOST: ${{ secrets.HOST }}
  SSH_KEY: ${{ secrets.SSH_KEY }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Execute Remote Deployment
        uses: appleboy/ssh-action@master
        with:
          host: ${{ env.HOST }}
          username: ${{ env.USER }}
          key: ${{ env.SSH_KEY }}
          port: 21 # Custom SSH port as per VPS configuration
          script: |
            echo "🚀 Starting Deployment for Sawari Sadhan Desktop..."
            
            # 1. Navigate to project root
            cd ${{ env.PROJECT_PATH }} || { echo "❌ Directory not found at ${{ env.PROJECT_PATH }}"; exit 1; }
            
            # 2. Pull latest changes
            echo "📥 Pulling latest changes from main..."
            git pull origin main
            
            # 3. Infrastructure Check: Ensure ss-network exists
            echo "🌐 Checking network infrastructure..."
            docker network inspect ss-network >/dev/null 2>&1 || \
              (echo "Creating ss-network..." && docker network create ss-network)
            
            # 4. Firewall Check: Ensure Port 5110 is open
            echo "🛡️ Configuring firewall for Port 5110..."
            sudo ufw allow 5110/tcp
            
            # 5. Orchestration: Rebuild and restart container
            echo "🏗️ Rebuilding and starting container..."
            docker compose up -d --build
            
            # 6. Maintenance: Cleanup dangling images
            echo "🧹 Cleaning up legacy images..."
            docker image prune -f
            
            echo "✅ Deployment Successful: Terminal reachable on Port 5110"
