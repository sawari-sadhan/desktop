name: Deploy Desktop Terminal

on:
  push:
    tags:
      - 'v*'

env:
  PROJECT_PATH: projects/sawarisadhan/desktop
  USER: ${{ secrets.USER }}
  HOST: ${{ secrets.HOST }}
  SSH_KEY: ${{ secrets.SSH_KEY }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ env.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p 21 -H ${{ env.HOST }} >> ~/.ssh/known_hosts

      - name: Prepare Directories
        run: |
          echo "📂 Ensuring project directory exists on VPS: ${{ env.PROJECT_PATH }}"
          ssh -o StrictHostKeyChecking=no -p 21 ${{ env.USER }}@${{ env.HOST }} "mkdir -p ${{ env.PROJECT_PATH }}"

      - name: Deploy to VPS
        run: |
          echo "🚀 Deploying Desktop Terminal to VPS..."
          
          # 1. Sync source code (Port 21)
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next' \
            -e "ssh -p 21 -o StrictHostKeyChecking=no" \
            ./ ${{ env.USER }}@${{ env.HOST }}:${{ env.PROJECT_PATH }}

          # 2. Execute remote orchestration
          ssh -o StrictHostKeyChecking=no -p 21 ${{ env.USER }}@${{ env.HOST }} "
            echo '📦 Starting remote orchestration...'
            cd ${{ env.PROJECT_PATH }} || { echo '❌ Directory not found'; exit 1; }
            
            echo '🌐 Checking network infrastructure...'
            docker network inspect ss-network >/dev/null 2>&1 || \
              (echo 'Creating ss-network...' && docker network create ss-network)

            echo '🛡️ Configuring firewall for Port 5110...'
            sudo ufw allow 5110/tcp
            
            echo '🏗️ Rebuilding and starting Desktop container...'
            docker compose up -d --build
            
            echo '🧹 Cleaning up legacy images...'
            docker image prune -f
            
            echo '✅ Deployment Successful: Terminal reachable on Port 5110'
          "
